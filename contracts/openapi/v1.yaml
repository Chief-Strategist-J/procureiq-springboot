openapi: 3.0.3
info:
  title: ProcureIQ Sales API
  description: API for managing CRM Sales Orders, Products, Accounts, and Notifications in ProcureIQ.
  version: 1.2.0
paths:
  /api/v1/auth/signup:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserResponse'
        '400':
          description: Username or email already exists / invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseErrorOnly'

  /api/v1/auth/login:
    post:
      summary: Authenticate user and retrieve JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseErrorOnly'

  /api/v1/auth/forgot-password:
    post:
      summary: Request a password reset link/token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: If the email matches an account, a reset token is generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'
        '400':
          description: Invalid email format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseErrorOnly'

  /api/v1/auth/reset-password:
    post:
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'
        '400':
          description: Invalid or expired reset token / validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseErrorOnly'

  /api/v1/notifications:
    get:
      summary: Retrieve paginated notifications feed for the authenticated user
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [all, pending, read, dismissed, failed]
            default: all
      responses:
        '200':
          description: A paginated list of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNotificationListResponse'
    post:
      summary: Trigger / send a new notification (producer invocation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendNotificationRequest'
      responses:
        '202':
          description: Notification accepted for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'

  /api/v1/notifications/{id}/status:
    put:
      summary: Update status of a notification for the recipient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationStatusRequest'
      responses:
        '200':
          description: Status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'

  /api/v1/notifications/unread-count:
    get:
      summary: Retrieve the combined count of unread targeted and broadcast notifications
      responses:
        '200':
          description: Combined unread count response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUnreadCountResponse'

  /api/v1/notifications/devices:
    post:
      summary: Register or update a user device for push notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '200':
          description: Device registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'

components:
  schemas:
    ApiError:
      type: object
      properties:
        message:
          type: string

    ApiResponseErrorOnly:
      type: object
      properties:
        status:
          type: string
          example: error
        code:
          type: integer
          example: 400
        data:
          type: object
          nullable: true
          example: null
        error:
          $ref: '#/components/schemas/ApiError'

    ApiResponseString:
      type: object
      properties:
        status:
          type: string
          example: success
        code:
          type: integer
          example: 200
        data:
          type: string
        error:
          $ref: '#/components/schemas/ApiError'
          nullable: true

    ApiResponseUserResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        code:
          type: integer
          example: 201
        data:
          $ref: '#/components/schemas/UserResponse'
        error:
          $ref: '#/components/schemas/ApiError'
          nullable: true

    ApiResponseLoginResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        code:
          type: integer
          example: 200
        data:
          $ref: '#/components/schemas/LoginResponse'
        error:
          $ref: '#/components/schemas/ApiError'
          nullable: true

    ApiResponseNotificationListResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        code:
          type: integer
          example: 200
        data:
          $ref: '#/components/schemas/NotificationListResponse'
        error:
          $ref: '#/components/schemas/ApiError'
          nullable: true

    ApiResponseUnreadCountResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        code:
          type: integer
          example: 200
        data:
          $ref: '#/components/schemas/UnreadCountResponse'
        error:
          $ref: '#/components/schemas/ApiError'
          nullable: true

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string

    ResetPasswordRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
        newPassword:
          type: string

    SignupRequest:
      type: object
      required:
        - username
        - password
        - email
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    NotificationResponse:
      type: object
      properties:
        id:
          type: integer
        typeCode:
          type: string
        sourceService:
          type: string
        payload:
          type: object
        metadata:
          type: object
        priority:
          type: integer
        targetScope:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    NotificationListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/NotificationResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    SendNotificationRequest:
      type: object
      required:
        - typeCode
        - sourceService
        - targetScope
        - payload
      properties:
        typeCode:
          type: string
        sourceService:
          type: string
        targetScope:
          type: string
          enum: [user, org, broadcast, segment]
        targetId:
          type: integer
        dedupKey:
          type: string
        payload:
          type: object
        metadata:
          type: object
        priority:
          type: integer
        scheduledFor:
          type: string
          format: date-time

    UpdateNotificationStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [read, dismissed]

    UnreadCountResponse:
      type: object
      properties:
        unreadCount:
          type: integer

    RegisterDeviceRequest:
      type: object
      required:
        - platform
      properties:
        platform:
          type: string
          enum: [web, ios, android]
        pushToken:
          type: string
        webPushEndpoint:
          type: object
        appVersion:
          type: string
        osVersion:
          type: string
        capabilities:
          type: object
