openapi: 3.0.3
info:
  title: ProcureIQ Sales API
  description: API for managing CRM Sales Orders, Products, Accounts, and Notifications in ProcureIQ.
  version: 1.1.0
paths:
  /api/v1/auth/signup:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Username or email already exists / invalid input

  /api/v1/auth/login:
    post:
      summary: Authenticate user and retrieve JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

  /api/v1/auth/forgot-password:
    post:
      summary: Request a password reset link/token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: If the email matches an account, a reset email will be sent
        '400':
          description: Invalid email format

  /api/v1/auth/reset-password:
    post:
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid or expired reset token / validation failure

  /api/v1/notifications:
    get:
      summary: Retrieve paginated notifications feed for the authenticated user
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [all, pending, read, dismissed, failed]
            default: all
      responses:
        '200':
          description: A paginated list of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
    post:
      summary: Trigger / send a new notification (producer invocation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendNotificationRequest'
      responses:
        '202':
          description: Notification accepted for delivery

  /api/v1/notifications/{id}/status:
    put:
      summary: Update status of a notification for the recipient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationStatusRequest'
      responses:
        '200':
          description: Status updated successfully

  /api/v1/notifications/unread-count:
    get:
      summary: Retrieve the combined count of unread targeted and broadcast notifications
      responses:
        '200':
          description: Combined unread count response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'

  /api/v1/notifications/devices:
    post:
      summary: Register or update a user device for push notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '200':
          description: Device registered successfully

components:
  schemas:
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string

    ResetPasswordRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
        newPassword:
          type: string

    SignupRequest:
      type: object
      required:
        - username
        - password
        - email
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'

    NotificationResponse:
      type: object
      properties:
        id:
          type: integer
        typeCode:
          type: string
        sourceService:
          type: string
        payload:
          type: object
        metadata:
          type: object
        priority:
          type: integer
        targetScope:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    NotificationListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/NotificationResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer

    SendNotificationRequest:
      type: object
      required:
        - typeCode
        - sourceService
        - targetScope
        - payload
      properties:
        typeCode:
          type: string
        sourceService:
          type: string
        targetScope:
          type: string
          enum: [user, org, broadcast, segment]
        targetId:
          type: integer
        dedupKey:
          type: string
        payload:
          type: object
        metadata:
          type: object
        priority:
          type: integer
        scheduledFor:
          type: string
          format: date-time

    UpdateNotificationStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [read, dismissed]

    UnreadCountResponse:
      type: object
      properties:
        unreadCount:
          type: integer

    RegisterDeviceRequest:
      type: object
      required:
        - platform
      properties:
        platform:
          type: string
          enum: [web, ios, android]
        pushToken:
          type: string
        webPushEndpoint:
          type: object
        appVersion:
          type: string
        osVersion:
          type: string
        capabilities:
          type: object
