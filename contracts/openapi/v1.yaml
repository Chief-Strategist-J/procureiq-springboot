openapi: 3.0.3
info:
  title: ProcureIQ Sales API
  description: API for managing CRM Sales Orders, Products, and Accounts in ProcureIQ.
  version: 1.0.0
paths:
  /api/v1/sales-orders:
    get:
      summary: Retrieve all active sales orders
      responses:
        '200':
          description: A list of sales orders.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SalesOrder'
    post:
      summary: Create a new sales order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesOrder'
      responses:
        '201':
          description: Created sales order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrder'
        '400':
          description: Invalid input

  /api/v1/sales-orders/{id}:
    get:
      summary: Get a sales order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detailed sales order info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrder'
        '404':
          description: Sales order not found
    put:
      summary: Update a sales order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesOrder'
      responses:
        '200':
          description: Updated sales order details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrder'
        '404':
          description: Sales order not found
    delete:
      summary: Soft-delete a sales order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Sales order soft-deleted successfully
        '404':
          description: Sales order not found

components:
  schemas:
    SalesOrder:
      type: OBJECT
      required:
        - deliveryDate
        - salesOrderDate
        - account
      properties:
        id:
          type: integer
        amdNo:
          type: integer
        assignAll:
          type: boolean
        deliveryDate:
          type: string
          format: date
        description:
          type: string
        entryDateTime:
          type: string
          format: date-time
        idVal:
          type: integer
        isActive:
          type: boolean
        isDeleted:
          type: boolean
        payMode:
          type: string
        poNumber:
          type: string
        poDate:
          type: string
          format: date
        salesOrderDate:
          type: string
          format: date
        updateEntryDateTime:
          type: string
          format: date-time
        username:
          type: string
        updateUsername:
          type: string
        account:
          $ref: '#/components/schemas/Account'
        orderProducts:
          type: array
          items:
            $ref: '#/components/schemas/SalesOrderProduct'

    Account:
      type: OBJECT
      required:
        - id
        - accountName
        - displayName
      properties:
        id:
          type: integer
        accountCode:
          type: string
        accountName:
          type: string
        displayName:
          type: string
        email:
          type: string
        phone:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        isDeleted:
          type: boolean

    SalesOrderProduct:
      type: OBJECT
      required:
        - product
        - qty
        - ratePerQty
        - taxPer
      properties:
        id:
          type: integer
        salesOrderId:
          type: integer
        product:
          $ref: '#/components/schemas/Product'
        qty:
          type: number
        ratePerQty:
          type: number
        purchaseRatePerQty:
          type: number
        taxPer:
          type: number
        discountValue:
          type: number
        discountValueType:
          type: string
        productInfo:
          type: string
        isRemove:
          type: boolean

    Product:
      type: OBJECT
      required:
        - id
        - productName
      properties:
        id:
          type: integer
        productName:
          type: string
        description:
          type: string
        hsnCode:
          type: string
        mfrPartNo:
          type: string
        purchaseCost:
          type: number
        unitRate:
          type: number
        isActive:
          type: boolean
        isDeleted:
          type: boolean
