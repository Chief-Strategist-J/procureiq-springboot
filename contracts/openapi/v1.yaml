    # -------------------------------------------------------------------------
    # Voice Call Scheduler Schemas
    # -------------------------------------------------------------------------

    ScheduleVoiceCallRequest:
      type: object
      required:
        - phoneNumber
        - instructions
        - scheduledAt
      properties:
        phoneNumber:
          type: string
          description: E.164-formatted destination phone number
          example: "+15551234567"
        instructions:
          type: string
          description: Spoken text or script to deliver in the call
          example: "Hello, your order has shipped and will arrive tomorrow."
        scheduledAt:
          type: string
          format: date-time
          description: ISO-8601 UTC timestamp when the call should be placed
          example: "2026-07-12T12:00:00Z"
        provider:
          type: string
          description: Voice provider to use (mock | twilio | vapi). Defaults to mock.
          enum: [mock, twilio, vapi]
          default: mock

    ScheduledCall:
      type: object
      properties:
        id:
          type: integer
          format: int64
        phoneNumber:
          type: string
        instructions:
          type: string
        scheduledAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [PENDING, CALLED, FAILED]
        provider:
          type: string
        createdAt:
          type: string
          format: date-time

    ApiResponseScheduledCall:
      type: object
      properties:
        status:
          type: string
          example: success
        code:
          type: integer
          example: 201
        data:
          $ref: '#/components/schemas/ScheduledCall'
        error:
          $ref: '#/components/schemas/ApiError'
          nullable: true

    ApiResponseScheduledCallList:
      type: object
      properties:
        status:
          type: string
          example: success
        code:
          type: integer
          example: 200
        data:
          type: array
          items:
            $ref: '#/components/schemas/ScheduledCall'
        error:
          $ref: '#/components/schemas/ApiError'
          nullable: true

