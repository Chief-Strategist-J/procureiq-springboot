  /api/v1/workflows/{id}:
    get:
      summary: Retrieve workflow by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Workflow retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkflow'
    put:
      summary: Update a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowRequest'
      responses:
        '200':
          description: Workflow updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkflow'
    delete:
      summary: Delete a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Workflow deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'

  /api/v1/workflows/{id}/runs:
    get:
      summary: Retrieve list of runs for a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of workflow runs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkflowRunList'
    post:
      summary: Trigger/Create a workflow run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Workflow run started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkflowRun'

  /api/v1/workflows/runs/{runId}:
    get:
      summary: Retrieve workflow run by ID
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Workflow run retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkflowRun'

  # ---------------------------------------------------------------------------
  # Voice Call Scheduler Paths
  # ---------------------------------------------------------------------------

  /api/v1/voice/schedule:
    post:
      summary: Schedule a new outbound voice call
      tags: [Voice]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleVoiceCallRequest'
      responses:
        '201':
          description: Voice call scheduled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseScheduledCall'
        '400':
          description: Missing or invalid request fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseErrorOnly'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseErrorOnly'

  /api/v1/voice/scheduled:
    get:
      summary: List all scheduled voice calls
      tags: [Voice]
      responses:
        '200':
          description: List of all scheduled voice calls
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseScheduledCallList'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseErrorOnly'

  /api/v1/voice/{id}:
    delete:
      summary: Delete / cancel a scheduled voice call by ID
      tags: [Voice]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Scheduled call deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'
        '404':
          description: Scheduled call not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseErrorOnly'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseErrorOnly'

