spring.application.name=springboot-app
server.port=6565

# Database Configuration (AlloyDB Omni / PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:aws-0-ap-southeast-2.pooler.supabase.com}:${DB_PORT:6543}/${DB_NAME:postgres}?prepareThreshold=0&stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.jqnbjsfpliiqjivapbta}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Scaibu@9664920749}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Hikari Connection Pool Settings
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=ProcureIQHikariCP
# Reduced pool size for Render free tier (512MB RAM limit)
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED



# JWT Security Configuration
jwt.secret=${JWT_SECRET:procureiq-secret-key-12345}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Binance API External Configurations
binance.api.key=${BINANCE_API_KEY:}
binance.api.secret=${BINANCE_API_SECRET:}
python.service.url=${PYTHON_SERVICE_URL:http://localhost:8000}

# Lazy init — load beans only on first request, not at startup
spring.main.lazy-initialization=true
# Suppress Spring banner (minor but clean)
spring.main.banner-mode=off
# Disable JMX to reduce startup bean registration overhead
spring.jmx.enabled=false
# Faster pool connection validation query
spring.datasource.hikari.connection-test-query=SELECT 1
# Exclude unused auto-configurations to reduce startup scan overhead
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration
